name: Bug Report
description: Create a report to help us improve the system
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      description: Which package in the monorepo does this bug affect?
      options:
        - api
        - web
        - mobile
        - infrastructure
        - multiple
        - unknown
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Explain exactly how to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Operating System, Browser Version, Node.js Version, pnpm version, etc.
    validations:
      required: true
